<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>itappens.ai — Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #08090d; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
        button { cursor: pointer; font-family: inherit; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const API = "http://localhost:8000/api";

        const S = {
            card: { background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 16, padding: "20px 24px" },
            muted: { color: "#64748b" },
            sub: { color: "#94a3b8" },
            accent: { color: "#a78bfa" },
            green: { color: "#10b981" },
            amber: { color: "#f59e0b" },
            mono: { fontFamily: "'JetBrains Mono', monospace" },
        };

        // ── TeamCard ──────────────────────────────────────────────────────────
        function TeamCard({ team }) {
            const status = team.status || "pipeline";
            const cfg = {
                live:        { label: "LIVE",         color: "#10b981", bg: "rgba(16,185,129,0.12)"  },
                beta:        { label: "BETA",         color: "#8b5cf6", bg: "rgba(139,92,246,0.12)"  },
                coming_soon: { label: "COMING SOON",  color: "#64748b", bg: "rgba(255,255,255,0.06)" },
                pipeline:    { label: "PIPELINE",     color: "#475569", bg: "rgba(255,255,255,0.03)" },
            };
            const sc = cfg[status] || cfg.pipeline;
            return (
                <div style={{ ...S.card, display: "flex", flexDirection: "column", gap: 20, position: "relative", opacity: status === "pipeline" ? 0.6 : 1, transition: "all 0.3s ease", borderRadius: 24 }}>
                    <div style={{ position: "absolute", top: 16, right: 16, fontSize: 10, fontWeight: 800, padding: "4px 8px", borderRadius: 6, background: sc.bg, color: sc.color, letterSpacing: "0.05em" }}>{sc.label}</div>
                    <div style={{ width: 56, height: 56, borderRadius: 16, background: "rgba(255,255,255,0.05)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 28 }}>{team.icon}</div>
                    <div>
                        <h3 style={{ fontSize: 20, fontWeight: 700, color: "#f1f5f9", marginBottom: 8 }}>{team.name}</h3>
                        <p style={{ fontSize: 13, ...S.sub, lineHeight: 1.6, marginBottom: 16 }}>{team.description}</p>
                        {team.points && (
                            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                                {team.points.map(p => (
                                    <div key={p} style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 12, ...S.muted }}>
                                        <span style={{ color: sc.color }}>✓</span> {p}
                                    </div>
                                ))}
                            </div>
                        )}
                        {team.progress && (
                            <div style={{ marginTop: 8 }}>
                                <div style={{ background: "rgba(255,255,255,0.07)", borderRadius: 10, height: 6, marginBottom: 8 }}>
                                    <div style={{ background: "#475569", width: `${team.progress}%`, height: "100%", borderRadius: 10 }} />
                                </div>
                                <div style={{ fontSize: 10, ...S.muted, fontWeight: 700, textTransform: "uppercase" }}>Development: {team.progress}% Completed</div>
                            </div>
                        )}
                        {team.completed_tasks?.length > 0 && (
                            <div style={{ fontSize: 11, ...S.green, fontWeight: 600, marginTop: 8 }}>
                                {team.completed_tasks.length} tasks completed
                            </div>
                        )}
                        {team.eta && <div style={{ fontSize: 11, ...S.muted, fontWeight: 700, textTransform: "uppercase", marginTop: 8 }}>Pipeline: {team.eta}</div>}
                    </div>
                </div>
            );
        }

        // ── ActivityFeed ──────────────────────────────────────────────────────
        function ActivityFeed({ activity }) {
            if (!activity?.length) return (
                <div style={{ textAlign: "center", padding: "60px 0", ...S.muted, background: "rgba(255,255,255,0.02)", borderRadius: 16, border: "1px dashed rgba(255,255,255,0.08)" }}>
                    <div style={{ fontSize: 36, marginBottom: 12 }}>🧠</div>
                    <div>No recent activity — waiting for agents to start.</div>
                </div>
            );
            return (
                <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                    {activity.map((item, idx) => (
                        <div key={idx} style={{ ...S.card, borderLeft: "2px solid rgba(139,92,246,0.5)" }}>
                            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                                <span style={{ fontWeight: 700, ...S.accent }}>{item.agent}</span>
                                <span style={{ fontSize: 10, ...S.muted }}>{new Date(item.timestamp).toLocaleTimeString()}</span>
                            </div>
                            <div style={{ fontSize: 12, ...S.sub, fontStyle: "italic", marginBottom: 4 }}>{item.action}</div>
                            <div style={{ fontSize: 13, color: "#e2e8f0", lineHeight: 1.5 }}>{item.thought}</div>
                        </div>
                    ))}
                </div>
            );
        }

        // ── CostMeter ─────────────────────────────────────────────────────────
        function CostMeter({ cost }) {
            if (!cost) return <div style={{ ...S.muted, textAlign: "center", padding: 40 }}>Loading cost data...</div>;
            const barColor = cost.pct_used >= 90 ? "#ef4444" : cost.pct_used >= 70 ? "#f59e0b" : "#10b981";
            return (
                <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>
                    <div style={{ textAlign: "center" }}>
                        <div style={{ fontSize: 10, textTransform: "uppercase", letterSpacing: "0.12em", ...S.muted, marginBottom: 6 }}>Today's Spend</div>
                        <div style={{ fontSize: 48, fontWeight: 900, color: barColor, ...S.mono }}>${cost.today_spent_usd?.toFixed(4) || "0.0000"}</div>
                        <div style={{ fontSize: 12, ...S.muted, marginTop: 8 }}>of ${cost.daily_budget_usd} daily budget</div>
                    </div>
                    <div style={{ background: "rgba(255,255,255,0.06)", borderRadius: 100, height: 10, overflow: "hidden" }}>
                        <div style={{ background: barColor, width: `${Math.min(100, cost.pct_used || 0)}%`, height: "100%", borderRadius: 100, transition: "width 1s ease" }} />
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
                        <div style={{ ...S.card, textAlign: "center" }}>
                            <div style={{ fontSize: 10, textTransform: "uppercase", ...S.muted, marginBottom: 6 }}>Budget Left</div>
                            <div style={{ fontSize: 22, fontWeight: 800, color: "#f1f5f9", ...S.mono }}>${cost.budget_remaining_usd?.toFixed(2)}</div>
                        </div>
                        <div style={{ ...S.card, textAlign: "center", background: "rgba(16,185,129,0.04)", borderColor: "rgba(16,185,129,0.15)" }}>
                            <div style={{ fontSize: 10, textTransform: "uppercase", ...S.green, marginBottom: 6, fontWeight: 700 }}>Saved vs Hiring</div>
                            <div style={{ fontSize: 22, fontWeight: 800, ...S.green, ...S.mono }}>${cost.saved_today_vs_hiring?.toFixed(0) || 0}</div>
                        </div>
                    </div>
                    {cost.spend_by_agent && Object.keys(cost.spend_by_agent).length > 0 && (
                        <div>
                            <div style={{ fontSize: 11, fontWeight: 600, ...S.muted, textTransform: "uppercase", marginBottom: 10 }}>Spend by Agent</div>
                            {Object.entries(cost.spend_by_agent).slice(0, 5).map(([agent, amt]) => (
                                <div key={agent} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: "1px solid rgba(255,255,255,0.05)" }}>
                                    <span style={{ fontSize: 13, ...S.accent }}>{agent}</span>
                                    <span style={{ fontSize: 13, ...S.mono, color: "#e2e8f0" }}>${amt.toFixed(4)}</span>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        // ── OutputReview ──────────────────────────────────────────────────────
        function OutputReview({ outputs, onRefresh }) {
            const [loading, setLoading] = useState({});

            const handleAction = async (id, action) => {
                setLoading(l => ({ ...l, [id]: action }));
                try {
                    await fetch(`${API}/outputs/${id}/${action}`, { method: "POST" });
                    onRefresh();
                } catch(e) {
                    console.error(e);
                } finally {
                    setLoading(l => { const n = {...l}; delete n[id]; return n; });
                }
            };

            if (!outputs?.length) return (
                <div style={{ textAlign: "center", padding: "60px 0", ...S.muted, background: "rgba(255,255,255,0.02)", borderRadius: 16, border: "1px dashed rgba(255,255,255,0.08)" }}>
                    <div style={{ fontSize: 36, marginBottom: 12 }}>✅</div>
                    <div>Review queue is clear — no pending outputs.</div>
                </div>
            );
            return (
                <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                    {outputs.map(o => (
                        <div key={o.id} style={{ ...S.card }}>
                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                                <span style={{ fontSize: 10, fontWeight: 800, background: "rgba(139,92,246,0.12)", color: "#a78bfa", padding: "3px 8px", borderRadius: 5, letterSpacing: "0.06em", textTransform: "uppercase" }}>{o.output_type}</span>
                                <span style={{ fontSize: 16, fontWeight: 700, ...S.green, ...S.mono }}>{o.quality_score}/10</span>
                            </div>
                            <pre style={{ background: "rgba(0,0,0,0.4)", padding: 12, borderRadius: 8, fontSize: 11, ...S.mono, color: "#94a3b8", whiteSpace: "pre-wrap", maxHeight: 120, overflow: "hidden", marginBottom: 14 }}>{o.content}</pre>
                            <div style={{ display: "flex", gap: 10 }}>
                                <button
                                    onClick={() => handleAction(o.id, "approve")}
                                    disabled={loading[o.id]}
                                    style={{ background: "rgba(16,185,129,0.1)", color: "#10b981", border: "1px solid rgba(16,185,129,0.25)", padding: "8px 16px", borderRadius: 8, fontSize: 12, fontWeight: 700, opacity: loading[o.id] ? 0.5 : 1 }}
                                >
                                    {loading[o.id] === "approve" ? "..." : "✅ Approve"}
                                </button>
                                <button
                                    onClick={() => handleAction(o.id, "reject")}
                                    disabled={loading[o.id]}
                                    style={{ background: "rgba(239,68,68,0.1)", color: "#f87171", border: "1px solid rgba(239,68,68,0.25)", padding: "8px 16px", borderRadius: 8, fontSize: 12, fontWeight: 700, opacity: loading[o.id] ? 0.5 : 1 }}
                                >
                                    {loading[o.id] === "reject" ? "..." : "❌ Reject"}
                                </button>
                            </div>
                        </div>
                    ))}
                </div>
            );
        }

        // ── WeeklyWinPanel ────────────────────────────────────────────────────
        function WeeklyWinPanel({ quality, cost, teams }) {
            const tasksDone = Object.values(teams || {}).reduce((acc, t) => acc + (t.completed_tasks?.length || 0), 0);
            const hoursSaved = tasksDone * 2;
            const freelancerCost = hoursSaved * 75;
            const actualCost = 497;
            const saved = Math.max(0, freelancerCost - actualCost);

            const rows = [
                { label: "Total tasks completed this week", val: tasksDone },
                { label: "Hours equivalent saved",          val: `~${hoursSaved} hrs` },
                { label: "Freelancer cost equivalent",      val: `~$${freelancerCost.toLocaleString()}` },
                { label: "What you actually paid",          val: `$${actualCost}`, highlight: true },
                { label: "You saved",                       val: `$${saved.toLocaleString()}`, accent: "#10b981" },
            ];

            return (
                <div style={{ ...S.card, display: "flex", flexDirection: "column", gap: 20 }}>
                    <div style={{ background: "linear-gradient(135deg, rgba(139,92,246,0.15), rgba(99,102,241,0.1))", border: "1px solid rgba(139,92,246,0.2)", borderRadius: 12, padding: "14px 18px", fontSize: 13, ...S.accent, lineHeight: 1.6 }}>
                        🚀 <strong>Your AI team never sleeps.</strong> Here's what they shipped while you did.
                    </div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                        {rows.map(r => (
                            <div key={r.label} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 0", borderBottom: "1px solid rgba(255,255,255,0.05)" }}>
                                <span style={{ fontSize: 13, ...S.sub }}>{r.label}</span>
                                <span style={{ fontSize: 15, fontWeight: 700, ...S.mono, color: r.accent || (r.highlight ? "#f1f5f9" : "#64748b") }}>{r.val}</span>
                            </div>
                        ))}
                    </div>
                    {quality && (
                        <div style={{ fontSize: 13, ...S.muted, borderTop: "1px solid rgba(255,255,255,0.07)", paddingTop: 14 }}>
                            Average quality score this week:{" "}
                            <strong style={{ color: quality.today_average_score >= 8 ? "#10b981" : "#f59e0b" }}>
                                {quality.today_average_score}/10
                            </strong>
                        </div>
                    )}
                    {cost && (
                        <div style={{ fontSize: 13, ...S.muted }}>
                            Total spent this month: <strong style={{ ...S.mono, color: "#e2e8f0" }}>${(cost.projected_monthly_usd || 0).toFixed(2)}</strong>
                            {" "} vs estimated savings: <strong style={{ ...S.green, ...S.mono }}>${(cost.saved_monthly_vs_hiring || 0).toFixed(0)}</strong>
                        </div>
                    )}
                </div>
            );
        }

        // ── SectionHeader ─────────────────────────────────────────────────────
        function SectionHeader({ title, subtitle }) {
            return (
                <div style={{ marginBottom: 24 }}>
                    <h1 style={{ fontSize: 22, fontWeight: 700, color: "#f1f5f9", letterSpacing: "-0.02em" }}>{title}</h1>
                    {subtitle && <p style={{ fontSize: 13, ...S.muted, marginTop: 4 }}>{subtitle}</p>}
                </div>
            );
        }

        // ── EmptyState ────────────────────────────────────────────────────────
        function EmptyState({ icon, text }) {
            return (
                <div style={{ textAlign: "center", padding: "60px 0", ...S.muted, background: "rgba(255,255,255,0.02)", borderRadius: 16, border: "1px dashed rgba(255,255,255,0.08)" }}>
                    <div style={{ fontSize: 40, marginBottom: 12 }}>{icon}</div>
                    <div style={{ fontSize: 14 }}>{text}</div>
                </div>
            );
        }

        // ── Main App ──────────────────────────────────────────────────────────
        function App() {
            const [activeTab, setActiveTab] = useState("teams");
            const [teams,    setTeams]    = useState({});
            const [outputs,  setOutputs]  = useState([]);
            const [cost,     setCost]     = useState(null);
            const [quality,  setQuality]  = useState(null);
            const [activity, setActivity] = useState([]);
            const [history,  setHistory]  = useState([]);
            const [loading,  setLoading]  = useState(true);
            const [lastUpdate, setLastUpdate] = useState(null);

            const fetchAll = useCallback(async () => {
                try {
                    const [teamsRes, outputsRes, costRes, qualityRes, activityRes, historyRes] = await Promise.all([
                        fetch(`${API}/teams`).then(r => r.json()).catch(() => ({})),
                        fetch(`${API}/outputs`).then(r => r.json()).catch(() => ({ outputs: [] })),
                        fetch(`${API}/cost`).then(r => r.json()).catch(() => null),
                        fetch(`${API}/quality`).then(r => r.json()).catch(() => null),
                        fetch(`${API}/activity`).then(r => r.json()).catch(() => []),
                        fetch(`${API}/history`).then(r => r.json()).catch(() => []),
                    ]);
                    setTeams(teamsRes);
                    setOutputs(outputsRes.outputs || []);
                    setCost(costRes);
                    setQuality(qualityRes);
                    setActivity(activityRes);
                    setHistory(historyRes);
                    setLastUpdate(new Date().toLocaleTimeString());
                    setLoading(false);
                } catch(e) {
                    console.error("Dashboard fetch error:", e);
                    setLoading(false);
                }
            }, []);

            useEffect(() => {
                fetchAll();
                const iv = setInterval(fetchAll, 15_000);
                return () => clearInterval(iv);
            }, [fetchAll]);

            const teamList   = Object.values(teams).filter(t => !["ceo","cto","cpo"].includes(t.team_id));
            const pendingCount = outputs.length;

            const TABS = [
                { id: "teams",    label: "🤖 Live Teams"   },
                { id: "activity", label: "🧠 Live Activity" },
                { id: "outputs",  label: "📋 Review Queue"  },
                { id: "cost",     label: "💰 Cost & Tokens" },
                { id: "history",  label: "🕰️ Job History"  },
                { id: "weekly",   label: "📈 Weekly Win"    },
            ];

            return (
                <div style={{ minHeight: "100vh", background: "#08090d", color: "#e2e8f0", fontFamily: "'Inter', sans-serif" }}>
                    {/* Header */}
                    <header style={{ padding: "0 32px", height: 64, display: "flex", alignItems: "center", justifyContent: "space-between", borderBottom: "1px solid rgba(255,255,255,0.07)", background: "rgba(255,255,255,0.02)", backdropFilter: "blur(12px)", position: "sticky", top: 0, zIndex: 100 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                            <div style={{ width: 34, height: 34, borderRadius: 10, background: "linear-gradient(135deg,#8b5cf6,#6366f1)", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 900, fontSize: 14, color: "#fff" }}>it</div>
                            <span style={{ fontWeight: 700, color: "#f1f5f9", fontSize: 15, fontStyle: "italic" }}>itappens.ai</span>
                        </div>

                        <div style={{ display: "flex", alignItems: "center", gap: 20 }}>
                            {/* Pending badge */}
                            {pendingCount > 0 && (
                                <div style={{ background: "rgba(245,158,11,0.15)", border: "1px solid rgba(245,158,11,0.3)", borderRadius: 20, padding: "3px 10px", fontSize: 12, color: "#f59e0b", fontWeight: 600 }}>
                                    {pendingCount} pending review
                                </div>
                            )}
                            {/* Live indicator */}
                            <div style={{ display: "flex", alignItems: "center", gap: 7, fontSize: 12, color: "#64748b" }}>
                                <span style={{ width: 7, height: 7, borderRadius: "50%", background: "#10b981", display: "inline-block", animation: "pulse 2s ease-in-out infinite" }} />
                                Live{lastUpdate && ` · ${lastUpdate}`}
                            </div>
                        </div>
                    </header>

                    <div style={{ display: "flex" }}>
                        {/* Sidebar */}
                        <nav style={{ width: 220, borderRight: "1px solid rgba(255,255,255,0.06)", padding: "24px 16px", display: "flex", flexDirection: "column", gap: 4, minHeight: "calc(100vh - 64px)", position: "sticky", top: 64 }}>
                            {TABS.map(t => (
                                <button
                                    key={t.id}
                                    onClick={() => setActiveTab(t.id)}
                                    style={{
                                        textAlign: "left", padding: "10px 12px", borderRadius: 10, fontSize: 13, fontWeight: 600,
                                        border: activeTab === t.id ? "1px solid rgba(139,92,246,0.25)" : "1px solid transparent",
                                        background: activeTab === t.id ? "rgba(139,92,246,0.1)" : "transparent",
                                        color: activeTab === t.id ? "#a78bfa" : "#64748b",
                                        position: "relative", display: "flex", alignItems: "center", gap: 8,
                                    }}
                                >
                                    {t.label}
                                    {t.id === "outputs" && pendingCount > 0 && (
                                        <span style={{ marginLeft: "auto", background: "#f59e0b", color: "#1a1200", borderRadius: 10, fontSize: 10, fontWeight: 700, padding: "1px 6px" }}>{pendingCount}</span>
                                    )}
                                </button>
                            ))}

                            {/* Quality summary */}
                            {quality && (
                                <div style={{ marginTop: "auto", ...S.card, padding: "14px" }}>
                                    <div style={{ fontSize: 11, ...S.muted, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 8 }}>Quality Today</div>
                                    <div style={{ fontSize: 28, fontWeight: 800, color: quality.today_average_score >= 8 ? "#10b981" : "#f59e0b", ...S.mono }}>
                                        {quality.today_average_score}/10
                                    </div>
                                    <div style={{ fontSize: 11, ...S.muted, marginTop: 2 }}>{quality.total_reviewed_today} outputs reviewed</div>
                                </div>
                            )}
                        </nav>

                        {/* Main content */}
                        <main style={{ flex: 1, padding: "32px 40px", overflowY: "auto" }}>
                            {loading ? (
                                <div style={{ textAlign: "center", marginTop: 80, ...S.muted, fontStyle: "italic" }}>Synchronizing Fleet...</div>
                            ) : (
                                <div style={{ maxWidth: 1000 }}>

                                    {/* PANEL 1 — Live Teams */}
                                    {activeTab === "teams" && (
                                        <div>
                                            <SectionHeader title="Live Teams" subtitle={`${teamList.length} teams running`} />
                                            {teamList.length === 0 ? (
                                                <EmptyState icon="🤖" text="No active teams yet. Run main.py to start the company." />
                                            ) : (
                                                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(300px, 1fr))", gap: 16 }}>
                                                    {teamList.map(team => <TeamCard key={team.team_id} team={team} />)}
                                                </div>
                                            )}
                                        </div>
                                    )}

                                    {/* PANEL 2 — Live Activity */}
                                    {activeTab === "activity" && (
                                        <div style={{ maxWidth: 800 }}>
                                            <SectionHeader title="Live Activity" subtitle="Real-time thoughts and actions from your AI team" />
                                            <ActivityFeed activity={activity} />
                                        </div>
                                    )}

                                    {/* PANEL 3 — Output Review */}
                                    {activeTab === "outputs" && (
                                        <div>
                                            <SectionHeader title="Output Review" subtitle="AI-generated content awaiting your approval" />
                                            <OutputReview outputs={outputs} onRefresh={fetchAll} />
                                        </div>
                                    )}

                                    {/* PANEL 4 — Cost & Tokens */}
                                    {activeTab === "cost" && (
                                        <div style={{ maxWidth: 900 }}>
                                            <SectionHeader title="Cost & Tokens" subtitle="Detailed spend breakdown by task and agent" />
                                            <div style={{ display: "grid", gridTemplateColumns: "1fr 1.5fr", gap: 24 }}>
                                                <div style={{ ...S.card, height: "fit-content" }}>
                                                    <CostMeter cost={cost} />
                                                </div>
                                                <div style={{ ...S.card, overflow: "hidden" }}>
                                                    <h3 style={{ fontSize: 14, ...S.muted, marginBottom: 16 }}>Detailed Transaction Log</h3>
                                                    <div style={{ maxHeight: 500, overflowY: "auto" }}>
                                                        {!cost?.detailed_logs?.length ? (
                                                            <div style={{ ...S.muted, fontSize: 13, textAlign: "center", padding: 20 }}>No transactions yet today.</div>
                                                        ) : (
                                                            <table style={{ width: "100%", fontSize: 12, borderCollapse: "collapse" }}>
                                                                <thead>
                                                                    <tr style={{ textAlign: "left", ...S.muted, borderBottom: "1px solid rgba(255,255,255,0.05)" }}>
                                                                        <th style={{ padding: "8px 4px" }}>Agent</th>
                                                                        <th style={{ padding: "8px 4px" }}>Task</th>
                                                                        <th style={{ padding: "8px 4px" }}>Cost</th>
                                                                    </tr>
                                                                </thead>
                                                                <tbody>
                                                                    {cost.detailed_logs.map((log, i) => (
                                                                        <tr key={i} style={{ borderBottom: "1px solid rgba(255,255,255,0.03)" }}>
                                                                            <td style={{ padding: "10px 4px", color: "#a78bfa", fontWeight: 600 }}>{log.agent}</td>
                                                                            <td style={{ padding: "10px 4px", ...S.sub }}>{log.task || "—"}</td>
                                                                            <td style={{ padding: "10px 4px", color: "#e2e8f0", ...S.mono }}>${log.cost_usd?.toFixed(4)}</td>
                                                                        </tr>
                                                                    ))}
                                                                </tbody>
                                                            </table>
                                                        )}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* PANEL 5 — Job History */}
                                    {activeTab === "history" && (
                                        <div style={{ maxWidth: 800 }}>
                                            <SectionHeader title="Job History" subtitle="Archive of all completed and submitted tasks" />
                                            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                                                {history.length === 0 ? (
                                                    <EmptyState icon="🕰️" text="No finished jobs in history yet." />
                                                ) : (
                                                    history.map((job, idx) => (
                                                        <div key={idx} style={{ ...S.card, display: "flex", alignItems: "center", gap: 20 }}>
                                                            <div style={{ fontSize: 24 }}>✅</div>
                                                            <div style={{ flex: 1 }}>
                                                                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
                                                                    <h4 style={{ fontSize: 14, color: "#f1f5f9", fontWeight: 600 }}>{job.team_id} ({job.type})</h4>
                                                                    <span style={{ fontSize: 11, ...S.muted }}>{new Date(job.timestamp).toLocaleString()}</span>
                                                                </div>
                                                                <p style={{ margin: "4px 0 0", fontSize: 13, ...S.sub }}>{job.goal}</p>
                                                            </div>
                                                            {job.quality_score && (
                                                                <div style={{ textAlign: "center", minWidth: 48 }}>
                                                                    <div style={{ fontSize: 10, ...S.muted, textTransform: "uppercase" }}>Quality</div>
                                                                    <div style={{ fontSize: 16, fontWeight: 700, ...S.green, ...S.mono }}>{job.quality_score}/10</div>
                                                                </div>
                                                            )}
                                                        </div>
                                                    ))
                                                )}
                                            </div>
                                        </div>
                                    )}

                                    {/* PANEL 6 — Weekly Win */}
                                    {activeTab === "weekly" && (
                                        <div style={{ maxWidth: 600 }}>
                                            <SectionHeader title="Weekly Win Summary" subtitle="This week's autonomous accomplishments" />
                                            <WeeklyWinPanel quality={quality} cost={cost} teams={teams} />
                                        </div>
                                    )}

                                </div>
                            )}
                        </main>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
